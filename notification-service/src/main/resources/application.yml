server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:secureclaims}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: notifications
    show-sql: false
  flyway:
    enabled: true
    schemas: notifications
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-256-bits}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
