server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: fraud-detection-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:secureclaims}
    username: ${DB_USERNAME:scadmin}
    password: ${DB_PASSWORD:admin123}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: fraud
    show-sql: false
  flyway:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
