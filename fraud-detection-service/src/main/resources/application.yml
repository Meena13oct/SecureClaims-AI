server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: fraud-detection-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:secureclaims}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: fraud
    show-sql: false
  flyway:
    enabled: true
    schemas: fraud
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-256-bits}
  fraud:
    rules:
      high-amount-threshold: ${FRAUD_HIGH_AMOUNT:50000}
      medium-amount-threshold: ${FRAUD_MEDIUM_AMOUNT:10000}
      high-amount-points: 3
      medium-amount-points: 1
      young-policy-months: 6
      young-policy-points: 2
      prior-claims-threshold: 3
      prior-claims-points: 3

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
