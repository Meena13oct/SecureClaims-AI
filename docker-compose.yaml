services:
  secureclaims-db:
    image: postgres:16.3
    container_name: secureclaims-db
    restart: always
    environment:
      POSTGRES_USER: scadmin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: secureclaims
    ports:
      - "5432:5432"
    volumes:
      - secureclaims-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scadmin -d secureclaims"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - secureclaims-network

  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: identity-service
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_HOST: secureclaims-db
      DB_PORT: 5432
      DB_NAME: secureclaims
      DB_USERNAME: scadmin
      DB_PASSWORD: admin123
      JWT_SECRET: my-dev-secret-key-at-least-32-chars-long
      JWT_EXPIRY_MS: 86400000
    depends_on:
      secureclaims-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - secureclaims-network

  claims-service:
    build:
      context: ./claims-service
      dockerfile: Dockerfile
    container_name: claims-service
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      DB_HOST: secureclaims-db
      DB_PORT: 5432
      DB_NAME: secureclaims
      DB_USERNAME: scadmin
      DB_PASSWORD: admin123
      JWT_SECRET: my-dev-secret-key-at-least-32-chars-long
      JWT_EXPIRY_MS: 86400000
    depends_on:
      secureclaims-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - secureclaims-network

  fraud-detection-service:
    build:
      context: ./fraud-detection-service
      dockerfile: Dockerfile
    container_name: fraud-detection-service
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      DB_HOST: secureclaims-db
      DB_PORT: 5432
      DB_NAME: secureclaims
      DB_USERNAME: scadmin
      DB_PASSWORD: admin123
      JWT_SECRET: my-dev-secret-key-at-least-32-chars-long
      JWT_EXPIRY_MS: 86400000
    depends_on:
      secureclaims-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - secureclaims-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    restart: on-failure
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      DB_HOST: secureclaims-db
      DB_PORT: 5432
      DB_NAME: secureclaims
      DB_USERNAME: scadmin
      DB_PASSWORD: admin123
      JWT_SECRET: my-dev-secret-key-at-least-32-chars-long
      JWT_EXPIRY_MS: 86400000
    depends_on:
      secureclaims-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - secureclaims-network

volumes:
  secureclaims-data:
    driver: local

networks:
  secureclaims-network:
    driver: bridge
