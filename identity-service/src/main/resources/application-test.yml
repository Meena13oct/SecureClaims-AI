spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: public
    show-sql: false
  flyway:
    enabled: false
  h2:
    console:
      enabled: false

app:
  jwt:
    secret: test-secret-key-for-unit-tests-must-be-at-least-256-bits-long-2026
    expiry-ms: 86400000
