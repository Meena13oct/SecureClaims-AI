server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: identity-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:secureclaims}?currentSchema=identity&TimeZone=Asia/Kolkata
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin123}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: identity
    show-sql: false
  flyway:
    enabled: true
    schemas: identity
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
