server:
  port: 8082

spring:
  application:
    name: claims-service
  datasource:
    url: jdbc:postgresql://localhost:5432/secureclaims
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: claims
    show-sql: true
  flyway:
    enabled: true
    schemas: claims
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: SecureClaimsAI-JWT-Secret-Key-Must-Be-At-Least-256-Bits-Long-2026
  upload:
    base-path: uploads/claims

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
