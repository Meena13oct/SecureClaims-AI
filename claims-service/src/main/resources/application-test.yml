spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: public
    show-sql: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
  h2:
    console:
      enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: test-secret-key-for-unit-tests-must-be-at-least-256-bits-long-2026
  upload:
    base-path: ${java.io.tmpdir}/test-uploads
