server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: claims-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:secureclaims}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: claims
    show-sql: false
  flyway:
    enabled: true
    schemas: claims
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-256-bits}
  upload:
    base-path: ${UPLOAD_BASE_PATH:uploads/claims}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
